<!-- Marbl repo-widget canonical partial. Spec: ./repo-widget.md
     Depends on canonical ui-items/button.css for .btn / .btn--mini /
     .btn--fill-up / .btn--outline used by the action buttons. -->
<article class="repo-widget repo-widget--{{REPO_VARIANT}}{{REPO_EXTRA_CLASSES}}"
         itemscope itemtype="https://schema.org/SoftwareSourceCode">
  <meta itemprop="codeRepository" content="{{REPO_URL}}">

  <header class="repo-widget__header">
    <svg class="repo-widget__icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
    <h3 class="repo-widget__name">
      <a href="{{REPO_URL}}"
         target="_blank" rel="noopener noreferrer"
         data-fathom-event="Repo widget - name click"
         itemprop="url">
        <span itemprop="name">{{REPO_OWNER}}/{{REPO_NAME}}</span>
      </a>
    </h3>
  </header>

  <p class="repo-widget__description repo-widget__description--filled-only" itemprop="description">{{REPO_DESCRIPTION}}</p>

  <ul class="repo-widget__meta" aria-label="Repository statistics">
    <li class="repo-widget__stat repo-widget__stat--stars"
        itemprop="interactionStatistic" itemscope itemtype="https://schema.org/InteractionCounter">
      <meta itemprop="interactionType" content="https://schema.org/LikeAction">
      <a href="{{REPO_URL}}"
         target="_blank" rel="noopener noreferrer"
         title="Star this repo on GitHub (you will need to be logged in)"
         aria-label="Star {{REPO_OWNER}}/{{REPO_NAME}} on GitHub - currently {{REPO_STARS}} stars"
         data-fathom-event="Repo widget - star intent click">
        <svg class="repo-widget__stat-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        <span class="repo-widget__stat-value" itemprop="userInteractionCount">{{REPO_STARS}}</span>
        <span class="repo-widget__stat-label">stars</span>
      </a>
    </li>
    <li class="repo-widget__stat repo-widget__stat--forks">
      <a href="{{REPO_URL}}/network/members"
         target="_blank" rel="noopener noreferrer"
         data-fathom-event="Repo widget - forks click">
        <svg class="repo-widget__stat-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 3a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm0 8a5 5 0 0 1-1-9.9V1a1 1 0 1 1 2 0v.1A5 5 0 0 1 6 11zm12-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm0 8a5 5 0 1 1 1-9.9V1a1 1 0 1 0-2 0v.1A5 5 0 0 0 18 11zM7 13.5h10v3a1 1 0 0 0 1 1 5 5 0 1 1-3 9 5 5 0 0 1-3-9 1 1 0 0 0 1-1v-3z"/>
        </svg>
        <span class="repo-widget__stat-value">{{REPO_FORKS}}</span>
        <span class="repo-widget__stat-label">forks</span>
      </a>
    </li>
    <li class="repo-widget__stat repo-widget__stat--version repo-widget__stat--filled-only">
      <svg class="repo-widget__stat-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21.41 11.58l-9-9A2 2 0 0 0 11 2H4a2 2 0 0 0-2 2v7a2 2 0 0 0 .59 1.42l9 9a2 2 0 0 0 2.83 0l7-7a2 2 0 0 0 0-2.84zM6.5 8A1.5 1.5 0 1 1 8 6.5 1.5 1.5 0 0 1 6.5 8z"/>
      </svg>
      <span class="repo-widget__stat-value" itemprop="softwareVersion">{{REPO_VERSION}}</span>
    </li>
    <li class="repo-widget__stat repo-widget__stat--updated">
      <svg class="repo-widget__stat-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 22a10 10 0 1 1 0-20 10 10 0 0 1 0 20zm0-2a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm1-8h4v2h-6V7h2v5z"/>
      </svg>
      <span class="repo-widget__stat-value"><time datetime="{{REPO_UPDATED_ISO}}">{{REPO_UPDATED}}</time></span>
    </li>
  </ul>

  <footer class="repo-widget__actions">
    <a class="btn btn--fill-up btn--mini"
       href="{{REPO_URL}}"
       target="_blank" rel="noopener noreferrer"
       data-fathom-event="Repo widget - View on GitHub">
      View on GitHub
      <span class="btn__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
      </span>
    </a>
    <a class="btn btn--outline btn--mini"
       href="{{REPO_DISCUSSIONS_URL}}"
       target="_blank" rel="noopener noreferrer"
       data-fathom-event="Repo widget - Join discussion">
      Join the discussion{{REPO_DISCUSSIONS_SUFFIX}}
      <span class="btn__icon btn__icon--no-rotate" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </span>
    </a>
  </footer>
</article>
